<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft風作業台 レシピ作成 (100個対応・色付け対応)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crafting-container">
        
        <div class="header-nav">
            <button id="prev-btn" title="前のレシピ">◀</button>
            <h1>Recipe <span id="recipe-index">1</span>/100</h1>
            <button id="next-btn" title="次のレシピ">▶</button>
        </div>
        
        <div class="crafting-area">
            <!-- 3x3 Grid -->
            <div class="grid-container">
                <!-- Slot 0 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-0" tabindex="0" data-placeholder="1"></div>
                    <textarea class="grid-input" id="slot-0" style="display: none;" placeholder="1"></textarea>
                </div>
                <!-- Slot 1 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-1" tabindex="0" data-placeholder="2"></div>
                    <textarea class="grid-input" id="slot-1" style="display: none;" placeholder="2"></textarea>
                </div>
                <!-- Slot 2 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-2" tabindex="0" data-placeholder="3"></div>
                    <textarea class="grid-input" id="slot-2" style="display: none;" placeholder="3"></textarea>
                </div>
                <!-- Slot 3 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-3" tabindex="0" data-placeholder="4"></div>
                    <textarea class="grid-input" id="slot-3" style="display: none;" placeholder="4"></textarea>
                </div>
                <!-- Slot 4 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-4" tabindex="0" data-placeholder="5"></div>
                    <textarea class="grid-input" id="slot-4" style="display: none;" placeholder="5"></textarea>
                </div>
                <!-- Slot 5 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-5" tabindex="0" data-placeholder="6"></div>
                    <textarea class="grid-input" id="slot-5" style="display: none;" placeholder="6"></textarea>
                </div>
                <!-- Slot 6 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-6" tabindex="0" data-placeholder="7"></div>
                    <textarea class="grid-input" id="slot-6" style="display: none;" placeholder="7"></textarea>
                </div>
                <!-- Slot 7 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-7" tabindex="0" data-placeholder="8"></div>
                    <textarea class="grid-input" id="slot-7" style="display: none;" placeholder="8"></textarea>
                </div>
                <!-- Slot 8 -->
                <div class="grid-item-wrapper">
                    <div class="grid-preview" id="preview-slot-8" tabindex="0" data-placeholder="9"></div>
                    <textarea class="grid-input" id="slot-8" style="display: none;" placeholder="9"></textarea>
                </div>
            </div>

            <!-- Arrow -->
            <div class="arrow">➔</div>

            <!-- Result -->
            <div class="result-container">
                <div class="result-wrapper">
                    <div class="result-preview" id="preview-result" tabindex="0"></div>
                    <textarea class="result-input" id="result" style="display: none;" placeholder="完成品を入力"></textarea>
                </div>
                <input type="number" class="result-count" id="count" value="1" min="1" max="64">
            </div>
        </div>

        <div class="controls">
            <button id="export-btn">一括エクスポート</button>
            <button id="import-btn">一括インポート</button>
            <input type="file" id="file-input" accept=".json" style="display: none;">
        </div>
        
        <div class="manage-controls">
            <button id="clear-btn">現在のレシピをクリア</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
